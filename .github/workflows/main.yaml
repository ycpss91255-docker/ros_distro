name: Main CI/CD Pipeline
run-name: ${{ github.actor }} triggered CI/CD on ${{ github.ref_name }}

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:

  call-docker-build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          # default
          - { name: 'noetic-desktop-full',  base: 'osrf/ros:noetic-desktop-full-focal' }
          - { name: 'noetic-ros-base',      base: 'ros:noetic-ros-base-focal' }
          - { name: 'kinetic-desktop-full', base: 'osrf/ros:kinetic-desktop-full-xenial' }
          - { name: 'kinetic-ros-base',     base: 'ros:kinetic-ros-base-xenial' }
    name: build (${{ matrix.target.name }})
    uses: ycpss91255-docker/base/.github/workflows/build-worker.yaml@v0.25.0
    with:
      image_name: ros_distro
      build_args: |
        BASE_IMAGE=${{ matrix.target.base }}

  # Stable-named aggregator so branch protection's required-status-check
  # doesn't have to enumerate every matrix entry. Branch protection
  # references `ci-passed`; matrix shape can change without re-configuring
  # protection.
  ci-passed:
    needs: call-docker-build
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
      - run: |
          if [ "${{ needs.call-docker-build.result }}" != "success" ]; then
            echo "One or more matrix builds failed (result=${{ needs.call-docker-build.result }})"
            exit 1
          fi
          echo "All matrix builds passed"

  # Publish per-variant Docker images to GHCR on tag push. Opt-in via
  # template's publish-worker.yaml (template v0.20.0+). Each matrix entry
  # publishes ghcr.io/ycpss91255-docker/ros_distro:${tag}-${entry-name};
  # the `is_latest: true` entry also publishes :latest-<entry-name>.
  #
  # Intent: CI build cache only. Downstream app repos (urg_node /
  # realsense / sick when consolidated) STILL `FROM` upstream
  # `osrf/ros:` / `ros:` directly, not these images. App CI may pass
  # `cache-from: type=registry,ref=ghcr.io/.../ros_distro:<tag>-<variant>`
  # to BuildKit as a best-effort cache hint -- if GHCR is reachable
  # the build skips the cached sys/base/devel layers; if not, builds
  # fall through to the full upstream rebuild without failing. This
  # keeps app repos self-contained (no hard dependency on GHCR being
  # reachable; works in air-gapped / firewalled networks).
  call-publish:
    needs: ci-passed
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: 'noetic-desktop-full',  base: 'osrf/ros:noetic-desktop-full-focal',   is_latest: true }
          - { name: 'noetic-ros-base',      base: 'ros:noetic-ros-base-focal',            is_latest: false }
          - { name: 'kinetic-desktop-full', base: 'osrf/ros:kinetic-desktop-full-xenial', is_latest: false }
          - { name: 'kinetic-ros-base',     base: 'ros:kinetic-ros-base-xenial',          is_latest: false }
    name: publish (${{ matrix.target.name }})
    uses: ycpss91255-docker/base/.github/workflows/publish-worker.yaml@v0.20.0
    with:
      image_name: ros_distro
      tag_suffix: "-${{ matrix.target.name }}"
      is_latest: ${{ matrix.target.is_latest }}
      target: devel
      build_args: |
        BASE_IMAGE=${{ matrix.target.base }}

  call-release:
    needs: call-docker-build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    uses: ycpss91255-docker/base/.github/workflows/release-worker.yaml@v0.25.0
    with:
      archive_name_prefix: ros_distro
    secrets: inherit
